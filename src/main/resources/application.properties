# Document Signer API Configuration

# Server settings
server.port=8080

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
# Manter uploads (certificado .pfx + PDF) SEMPRE em memória, nunca em disco.
# Threshold >= max-request-size => Tomcat não grava temp file em java.io.tmpdir. (SEC #1)
spring.servlet.multipart.file-size-threshold=100MB

# Logging — INFO em produção. NUNCA logar senha, bytes do certificado ou do PDF. (SEC #5)
logging.level.root=INFO
logging.level.com.example.documentsigner=INFO

# Application name
spring.application.name=document-signer-api
