server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Frontend - SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - Reverse proxy
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Documento assinado / dados do certificado NÃO devem ser cacheados
        # em proxy nem navegador. (SEC #10)
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;

        # Não bufferizar o corpo do upload em disco (mantém .pfx/PDF fora do FS). (SEC #1/#2)
        proxy_request_buffering off;

        # Timeouts para uploads grandes
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Security headers (SEC #10)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — TLS terminado no Cloudflare; reforça HTTPS no navegador.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: SPA self-contained. Fonts do Google são usadas no index (fonts.googleapis/gstatic).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Access logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
